# Fly.io configuration for Detach Backend Core
app = 'detach-backend-core'
primary_region = 'iad'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '3000'
  CHROME_EXECUTABLE_PATH = '/ms-playwright/chromium-1140/chrome-linux/chrome'
  HEADLESS = 'true'
  DOWNLOADS_DIR = '/app/downloads'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '5s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'performance-1x'
  memory = '2gb'
  
  # Enable shared memory for browser automation
  [[vm.mounts]]
    source = "shm"
    destination = "/dev/shm"
    type = "tmpfs"
    size = "1gb"