# Fly.io configuration for Detach Backend
app = 'detach-backend'
primary_region = 'iad'  # US East - change as needed

[build]

[env]
  NODE_ENV = 'production'
  DISPLAY = ':99'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '5s'
    method = 'GET'
    path = '/health'

[machine]
  # Increased resources for Chrome browser processes
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 2

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'

[mounts]
  source = 'downloads_vol'
  destination = '/app/downloads'

# Process groups
[processes]
  app = 'node universal-downloader-backend.js'

# Auto-scaling based on load
[scaling]
  min_machines = 1
  max_machines = 3

[[services]]
  internal_port = 3000
  protocol = 'tcp'

  [[services.ports]]
    handlers = ['http']
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ['tls', 'http']
    port = 443

  [[services.http_checks]]
    interval = '30s'
    timeout = '10s'
    method = 'GET'
    path = '/health'
    grace_period = '5s'

# Environment variables that can be set via fly secrets
# Use: fly secrets set VARIABLE_NAME=value
[env]
  NODE_ENV = 'production'
  DISPLAY = ':99'
  PORT = '3000'