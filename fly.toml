# Fly.io configuration for Detach Backend Core
app = 'detach-backend-core'
primary_region = 'iad'

[build]

[env]
  NODE_ENV = 'production'
  DISPLAY = ':99'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '5s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'